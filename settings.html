<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Settings - IRIS Vision</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon">IR</div>
      <h2>IRIS Vision</h2>
    </div>
    <nav>
      <div class="nav-section">
        <label>Main</label>
        <a href="dashboard.html" class="nav-item">Dashboard</a>
        <a href="upload.html" class="nav-item">Upload Data</a>
        <a href="analysis.html" class="nav-item">Satellite Analysis</a>
        <a href="earth.html" class="nav-item">Earth Topography</a>
      </div>
      <div class="nav-section">
        <label>System</label>
        <a href="history.html" class="nav-item">History</a>
        <a href="settings.html" class="nav-item active">Settings</a>
      </div>
    </nav>
  </aside>
  
  <main class="main-content">
    <div class="page-header">
      <h1>System Settings</h1>
      <p>Configure thermal thresholds, visualization modes, and alert preferences.</p>
    </div>
    
    <div class="glass-card" style="max-width:600px;">
      <div class="form-group">
        <label>Default Thermal Mode</label>
        <select id="settingMode">
          <option value="heat">Infrared Heat Map</option>
          <option value="spectrum">Spectrum</option>
          <option value="risk">Risk Assessment</option>
        </select>
      </div>
      
      <div class="form-group">
        <label>Default Sensor Intensity</label>
        <input type="number" id="settingIntensity" min="1" max="5" value="2">
      </div>
      
      <div class="toggle-row">
        <span>Overheating Alerts</span>
        <div class="toggle-switch active" id="toggleAlerts"></div>
      </div>
      
      <div class="toggle-row">
        <span>Auto-Process Uploads</span>
        <div class="toggle-switch" id="toggleAuto"></div>
      </div>
    </div>
  </main>
</div>
<script src="app.js"></script>
</body>
</html>
